<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关于奕涵的回忆</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Long+Cang&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="time-overlay" id="timeOverlay"></div>

  <nav class="langs" id="langs" aria-label="langue / 语言 / language">
    <button class="stamp" data-lang="fr" aria-label="Français">FR</button>
    <button class="stamp active" data-lang="zh" aria-label="中文">中</button>
    <button class="stamp" data-lang="en" aria-label="English">EN</button>
    <button class="player-btn" id="playerBtn" aria-label="Musique / 音乐">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <polygon class="icon-play" points="7,4 20,12 7,20"/>
      </svg>
    </button>
  </nav>

  <div class="player-info" id="playerInfo">
    <button class="skip-btn" id="prevBtn" aria-label="Précédente / 上一首">
      <svg viewBox="0 0 16 16"><path d="M3,2v12h2V9l7,5V2L5,7V2z"/></svg>
    </button>
    <span class="track-name" id="trackName"></span>
    <button class="skip-btn" id="nextBtn" aria-label="Suivante / 下一首">
      <svg viewBox="0 0 16 16"><path d="M13,14V2h-2v5L4,2v12l7-5v5z"/></svg>
    </button>
  </div>

  <main class="stage">
    <div class="envelope-wrap" id="envWrap">
      <div class="envelope" id="envelope" role="button" tabindex="0" aria-label="打开信件">
        <div class="env-back"></div>
        <div class="env-letter-peek"></div>
        <div class="env-front"></div>
        <div class="env-flap"></div>
        <div class="seal" aria-hidden="true">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <g id="rose5">
                <circle cx="0" cy="-6" r="5"/><circle cx="5.7" cy="-1.85" r="5"/>
                <circle cx="3.53" cy="4.85" r="5"/><circle cx="-3.53" cy="4.85" r="5"/>
                <circle cx="-5.7" cy="-1.85" r="5"/>
              </g>
            </defs>
            <g fill="none" stroke="var(--leaf)" stroke-width="1.4" stroke-linecap="round" opacity=".85">
              <path d="M50,78 C46,66 40,58 33,50"/>
              <path d="M50,78 C50,64 50,55 50,46"/>
              <path d="M50,78 C54,66 60,58 67,50"/>
            </g>
            <g fill="var(--leaf)">
              <ellipse cx="37" cy="59" rx="9" ry="4" transform="rotate(-42 37 59)"/>
              <ellipse cx="63" cy="59" rx="9" ry="4" transform="rotate(42 63 59)"/>
              <ellipse cx="50" cy="67" rx="4.5" ry="9"/>
            </g>
            <use href="#rose5" transform="translate(35,45) scale(0.88)" fill="var(--rose)"/>
            <circle cx="35" cy="45" r="3.3" fill="var(--rose-gold)"/>
            <use href="#rose5" transform="translate(65,45) scale(0.88)" fill="var(--rose)"/>
            <circle cx="65" cy="45" r="3.3" fill="var(--rose-gold)"/>
            <use href="#rose5" transform="translate(50,50) scale(1.32)" fill="var(--rose-soft)"/>
            <circle cx="50" cy="50" r="4.7" fill="var(--rose-gold)"/>
          </svg>
        </div>
      </div>
      <p class="hint" id="hint">
        <span>Touchez l'enveloppe pour ouvrir la lettre</span>
        <span class="zh">轻触信封，展开这封信</span>
      </p>
      <div class="lock" id="lock">
        <div class="gate-cap">
          <span>Un mot de passe, pour l'ouvrir</span>
          <span class="zh">输入密码，方可展信</span>
        </div>
        <div class="pin" id="pin">
          <div class="pin-cells" id="pinCells">
            <span class="pin-cell"></span><span class="pin-cell"></span><span class="pin-cell"></span><span class="pin-cell"></span>
            <span class="pin-cell"></span><span class="pin-cell"></span><span class="pin-cell"></span><span class="pin-cell"></span>
          </div>
          <input id="pw" class="pin-input" type="text" inputmode="numeric" pattern="[0-9]*"
                 autocomplete="off" maxlength="8" aria-label="mot de passe / 密码">
        </div>
      </div>
    </div>

    <article class="letter" id="letter" data-lang="zh" aria-live="polite"></article>
    <button class="reseal" id="reseal">重新封缄</button>
  </main>

<script src="content.js"></script>
<script src="app.js"></script>
<script src="atmosphere.js"></script>
<script src="player.js"></script>
</body>
</html>
